apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ledger-api-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/sahal6282/dodo_assignment.git'
    targetRevision: main
    path: ledger-api-assignment/deploy/hardened
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: payments
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
