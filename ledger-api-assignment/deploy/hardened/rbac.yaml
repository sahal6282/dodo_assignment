apiVersion: v1
kind: ServiceAccount
metadata:
  name: ledger-api-sa
  namespace: payments
  labels:
    app: ledger-api
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ledger-api-role
  namespace: payments
rules:
  - apiGroups: [""]
    resources: ["endpoints"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ledger-api-rolebinding
  namespace: payments
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ledger-api-role
subjects:
  - kind: ServiceAccount
    name: ledger-api-sa
    namespace: payments
