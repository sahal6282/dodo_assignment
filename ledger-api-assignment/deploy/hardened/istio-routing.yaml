apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: ledger-api
  namespace: payments
spec:
  host: ledger-api
  subsets:
  - name: v1
    labels:
      version: v1
  - name: v2
    labels:
      version: v2
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: ledger-api
  namespace: payments
spec:
  hosts:
  - "ledger.example.com"
  gateways:
  - ledger-gateway
  http:
  - route:
    - destination:
        host: ledger-api
        subset: v1
      weight: 90
    - destination:
        host: ledger-api
        subset: v2
      weight: 10
