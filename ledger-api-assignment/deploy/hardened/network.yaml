apiVersion: v1
kind: Service
metadata:
  name: ledger-api
  namespace: payments
spec:
  selector:
    app: ledger-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ledger-api-ingress
  namespace: payments
spec:
  rules:
  - host: ledger-api.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ledger-api
            port:
              number: 80
